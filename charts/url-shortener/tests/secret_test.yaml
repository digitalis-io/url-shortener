suite: secret tests
templates:
  - secret.yaml

tests:
  - it: renders session secret by default
    set:
      app.publicBaseURL: https://short.example.com
      app.adminBaseURL: https://admin.example.com
      cassandra.hosts: cassandra:9042
      session.secret: mysecret
    asserts:
      - hasDocuments:
          count: 3
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: RELEASE-NAME-url-shortener-session

  - it: skips session secret when existingSecret set
    set:
      app.publicBaseURL: https://short.example.com
      app.adminBaseURL: https://admin.example.com
      cassandra.hosts: cassandra:9042
      session.existingSecret: my-external-session-secret
    asserts:
      - hasDocuments:
          count: 2
      - notContainsDocument:
          kind: Secret
          apiVersion: v1
          name: RELEASE-NAME-url-shortener-session

  - it: skips cassandra secret when existingSecret set
    set:
      app.publicBaseURL: https://short.example.com
      app.adminBaseURL: https://admin.example.com
      cassandra.hosts: cassandra:9042
      cassandra.existingSecret: my-external-cassandra-secret
    asserts:
      - hasDocuments:
          count: 2
      - notContainsDocument:
          kind: Secret
          apiVersion: v1
          name: RELEASE-NAME-url-shortener-cassandra

  - it: skips saml secret when existingSecret set
    set:
      app.publicBaseURL: https://short.example.com
      app.adminBaseURL: https://admin.example.com
      cassandra.hosts: cassandra:9042
      saml.existingSecret: my-external-saml-secret
    asserts:
      - hasDocuments:
          count: 2
      - notContainsDocument:
          kind: Secret
          apiVersion: v1
          name: RELEASE-NAME-url-shortener-saml
