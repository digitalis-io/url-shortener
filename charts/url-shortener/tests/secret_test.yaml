suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: renders no Secret with default (empty) sensitive values
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no Secret when session.existingSecret is set
    set:
      session.existingSecret: external-session
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Secret with SESSION_SECRET when session.secret is provided
    set:
      session.secret: super-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.SESSION_SECRET
          value: super-secret

  - it: renders Cassandra and SAML secret material when provided
    set:
      cassandra.password: cass-pw
      saml.privateKey: pem-key
      saml.certificate: pem-cert
    asserts:
      - equal:
          path: stringData.CASSANDRA_PASSWORD
          value: cass-pw
      - equal:
          path: stringData.SAML_PRIVATE_KEY
          value: pem-key
      - equal:
          path: stringData.SAML_CERTIFICATE
          value: pem-cert
