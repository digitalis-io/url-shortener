suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: renders no Ingress when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a valid Ingress when enabled with host and TLS values
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.hosts:
        - host: short.example
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - secretName: short-tls
          hosts:
            - short.example
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: spec.rules[0].host
          value: short.example
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-url-shortener
      - equal:
          path: spec.tls[0].secretName
          value: short-tls
