name: CI

on:
  push:
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      cassandra:
        image: cassandra:5.0
        ports:
          - 9042:9042
        env:
          CASSANDRA_CLUSTER_NAME: url-shortener-ci
          CASSANDRA_DC: dc1
          CASSANDRA_RACK: rack1
          CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
        options: >-
          --health-cmd "cqlsh -e 'describe keyspaces'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Build binary
        run: go build -o /tmp/url-shortener ./cmd/url-shortener

      - name: Run Cassandra integration tests
        env:
          CASSANDRA_INTEGRATION: "1"
          CASSANDRA_HOSTS: localhost:9042
          CASSANDRA_KEYSPACE: url_shortener_ci
        run: go test ./internal/storage/cassandra -run TestIntegrationURLLifecycleAndHourlyHits -count=1 -v

      - name: Start app for UI smoke test
        env:
          AUTH_DEV_BYPASS: "true"
          SESSION_SECRET: ci-local-session-secret
          HTTP_ADDR: :18080
          PUBLIC_BASE_URL: http://localhost:18080
          ADMIN_BASE_URL: http://localhost:18080
          CASSANDRA_HOSTS: localhost:9042
          CASSANDRA_KEYSPACE: url_shortener_ci_ui
        run: |
          go run ./cmd/url-shortener > /tmp/url-shortener.log 2>&1 &
          echo "$!" > /tmp/url-shortener.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:18080/readyz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/url-shortener.log
          exit 1

      - name: Run admin UI smoke test
        env:
          UI_BASE_URL: http://localhost:18080
        run: node test/ui/admin_smoke.mjs

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/url-shortener.pid ]; then
            kill "$(cat /tmp/url-shortener.pid)" || true
          fi
          if [ -f /tmp/url-shortener.log ]; then
            cat /tmp/url-shortener.log
          fi

      - name: Build Docker image
        run: docker build -t url-shortener:ci .

  helm-lint-test:
    name: Helm Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: helm/setup-helm@v4
        with:
          version: v3.18.4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Lint chart
        run: ct lint --charts charts/url-shortener --validate-maintainers=false

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Run chart unit tests
        run: helm unittest charts/url-shortener

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:v1.29.8

      - name: Render and validate manifests against the API server
        run: |
          helm template url-shortener charts/url-shortener \
            --set app.publicBaseURL=https://short.example \
            --set app.adminBaseURL=https://admin.example \
            --set cassandra.hosts=cassandra:9042 \
          | kubectl apply --dry-run=server -f -

  publish-image:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [test, helm-lint-test]
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: helm/setup-helm@v4
        with:
          version: v3.18.4

      - name: Log in to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          CHART_VERSION=${{ github.ref_name }}
          helm package charts/url-shortener \
            --version "${CHART_VERSION#v}" \
            --app-version "${{ github.ref_name }}"
          helm push url-shortener-*.tgz oci://ghcr.io/digitalis-io/helm-charts
